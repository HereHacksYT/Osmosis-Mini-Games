<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Osmosis-Mini-Games</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.cjs.js"></script>
</head>
<body>
  <div id="menu">
    <h1>🎮 Osmosis-Mini-Games</h1>
    <div id="player-select">
      <button class="player-btn" data-players="1">1 Oyuncu</button>
      <button class="player-btn" data-players="2">2 Oyuncu</button>
      <button class="player-btn" data-players="3">3 Oyuncu</button>
      <button class="player-btn" data-players="4">4 Oyuncu</button>
    </div>
    <div id="game-select" style="display:none;">
      <button class="game-btn" data-game="mini-game-2d">🎨 Renk Patlaması (2D)</button>
      <button class="game-btn" data-game="mini-game-3d">🧊 3D Hazine Avı</button>
    </div>
  </div>
  <div id="game-container" style="display:none;"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
